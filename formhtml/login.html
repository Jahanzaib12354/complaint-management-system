<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="/formcss/login.css">
</head>
<body>

<div class="card">
<h2>Login</h2>

<form id="loginForm">
<input type="email" id="loginEmail" placeholder="Email">
<span class="error" id="loginEmailError"></span>

<input type="password" id="loginPassword" placeholder="Password">
<span class="error" id="loginPassError"></span>

<button type="submit">Login</button>
</form>

</div>

<script src="/formjs/login.js"></script>
</body>
</html>
